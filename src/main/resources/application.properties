# Nombre de la aplicación, aparece en logs y en el contexto de Spring.
spring.application.name=InventPro

# --- Conexión a la base de datos MySQL ---
# createDatabaseIfNotExist=true evita tener que crear la BD manualmente
# antes de levantar la app (útil en desarrollo/local).
spring.datasource.url=jdbc:mysql://localhost:3306/invent_pro_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# --- Configuración de JPA / Hibernate ---
# ddl-auto=update: Hibernate crea/actualiza las tablas automáticamente
# según las entidades. Cómodo en desarrollo, pero en producción se
# recomienda usar migraciones controladas (ej. Flyway/Liquibase) en
# vez de dejar que Hibernate modifique el esquema solo.
spring.jpa.hibernate.ddl-auto=update

# Muestra en consola el SQL generado por Hibernate (útil para depurar).
spring.jpa.show-sql=true

# Formatea el SQL mostrado para que sea más legible.
spring.jpa.properties.hibernate.format_sql=true

# --- Configuración del log ---
# Patrón: hilo, nivel, logger de origen y mensaje.
logging.pattern.console=[%thread] %-5level: %logger -%msg%n

# Configura el nivel de log general (INFO evita ruido de logs DEBUG).
logging.level.root=INFO

# Oculta el banner de Spring Boot al iniciar la app.
spring.main.banner-mode=off

# --- Configuración de JWT (RNF03) ---
# Clave secreta usada para firmar/verificar los tokens. En producción
# esto NO debe ir en el repositorio: se debe inyectar como variable
# de entorno. Aquí se deja un valor de ejemplo solo para desarrollo.
jwt.secret=cambiar_esta_clave_por_una_muy_larga_y_secreta_en_produccion_123456
# Tiempo de vida del token en milisegundos (86400000 = 24 horas).
jwt.expiration-ms=86400000